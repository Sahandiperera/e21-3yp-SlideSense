spring.application.name=slidesense-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/slidesense}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:slidesense}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:slidesense}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

security.jwt.secret=${SECURITY_JWT_SECRET:l7D2c9WzQh7VJbN6mGg4m3j6Qx0v8cT1yA5fK9pL2sR4uN7wE1dH6qM8zB3nY5tC0aP9kR2xV7jF4mN6uQ==}
security.jwt.access-expiration-ms=${SECURITY_JWT_ACCESS_EXPIRATION_MS:900000}
security.jwt.refresh-expiration-ms=${SECURITY_JWT_REFRESH_EXPIRATION_MS:604800000}
security.api-key.header=${SECURITY_API_KEY_HEADER:X-API-Key}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
